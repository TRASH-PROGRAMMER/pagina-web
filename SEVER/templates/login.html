<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Image Manager</title>
  <style>
    :root {
      --bg: #0b0b12;
      --panel: #151522;
      --line: #2a2a3a;
      --text: #f2f3ff;
      --muted: #9ca3b0;
      --accent: #2dd4bf;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1e1e35, transparent 40%), var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input {
      width: 100%;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #11111a;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.18);
    }
    .error {
      margin: 0 0 14px;
      border: 1px solid rgba(255, 107, 107, 0.4);
      background: rgba(255, 107, 107, 0.12);
      color: #ffd7d7;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00c6ff, #00d084);
      color: #00120a;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <form class="card" method="post" autocomplete="off" id="loginForm" novalidate>
    <h1>Iniciar sesion</h1>
    <p>Accede segun tu rol: admin, operador o cajero.</p>

    {% with messages = get_flashed_messages(category_filter=['error']) %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <div class="error" id="loginError" style="display:none" role="alert" aria-live="assertive"></div>

    <label for="username">Usuario</label>
    <input id="username" name="username" required>

    <label for="password">Contrasena</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Entrar al sistema</button>
    <div class="hint">Pide al administrador tus credenciales.</div>
  </form>

  <script>
    (function() {
      const TOKEN_KEY = "im.auth.token";
      const USER_KEY = "im.auth.user";
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("loginError");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");

      function showError(message) {
        if (!errorBox) return;
        errorBox.textContent = message;
        errorBox.style.display = "block";
      }

      function clearError() {
        if (!errorBox) return;
        errorBox.textContent = "";
        errorBox.style.display = "none";
      }

      if (!form) return;

      form.addEventListener("submit", async function(event) {
        event.preventDefault();
        clearError();

        const username = (usernameInput && usernameInput.value || "").trim();
        const password = passwordInput && passwordInput.value || "";

        if (!username || !password) {
          showError("Ingresa usuario y contrasena");
          return;
        }

        try {
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({ username, password })
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "No se pudo iniciar sesion");
          }

          sessionStorage.setItem(TOKEN_KEY, data.token || "");
          sessionStorage.setItem(USER_KEY, JSON.stringify(data.user || {}));
          window.location.href = data.redirect || "/";
        } catch (error) {
          showError(error.message || "Error de inicio de sesion");
        }
      });
    })();
  </script>
</body>
</html>
