<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Image Manager</title>
  <style>
    :root {
      --bg: #0b0b12;
      --panel: #151522;
      --line: #2a2a3a;
      --text: #f2f3ff;
      --muted: #9ca3b0;
      --accent: #2dd4bf;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 20%, #1e1e35, transparent 40%), var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input {
      width: 100%;
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #11111a;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.18);
    }
    .error {
      margin: 0 0 14px;
      border: 1px solid rgba(255, 107, 107, 0.4);
      background: rgba(255, 107, 107, 0.12);
      color: #ffd7d7;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(90deg, #00c6ff, #00d084);
      color: #00120a;
      font-weight: 700;
      font-size: 14px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <form class="card" method="post" autocomplete="off">
    <h1>Iniciar sesion</h1>
    <p>Accede segun tu rol: admin, operador o cajero.</p>

    {% with messages = get_flashed_messages(category_filter=['error']) %}
      {% if messages %}
        <div class="error">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <label for="username">Usuario</label>
    <input id="username" name="username" required>

    <label for="password">Contrasena</label>
    <input id="password" name="password" type="password" required>

    <button type="submit">Entrar al sistema</button>
    <div class="hint">Pide al administrador tus credenciales.</div>
  </form>
</body>
</html>
