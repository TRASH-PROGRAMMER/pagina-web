name: Deploy to Server (Docker)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Preflight - validate SSH connectivity
        run: |
          set -e
          echo "Checking TCP connectivity to ${SERVER_HOST}:${SERVER_PORT}"
          nc -vz -w 10 "${SERVER_HOST}" "${SERVER_PORT}"
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}

      - name: Copy project files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "requirements.txt,SEVER/,Dockerfile,docker-compose.yml,.dockerignore"
          target: /home/${{ secrets.SERVER_USER }}/pagina-web
          overwrite: true
          timeout: 120s
          command_timeout: 10m
          debug: true

      - name: Deploy via SSH with Docker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 120s
          command_timeout: 20m
          debug: true
          script: |
            set -e
            APP_DIR="/home/${{ secrets.SERVER_USER }}/pagina-web"
            cd "$APP_DIR"

            # ── 1. Crear .ENV con secretos ──
            cat > "$APP_DIR/.ENV" <<EOF
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            EOF

            # Quitar espacios en blanco al inicio de cada línea
            sed -i 's/^[[:space:]]*//' "$APP_DIR/.ENV"

            # ── 2. Build y deploy con Docker Compose ──
            docker compose down || true
            docker compose up -d --build

            echo "Deploy completado. Contenedores activos:"
            docker compose ps
